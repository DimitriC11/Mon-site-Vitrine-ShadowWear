    <div class="auth-container" style="max-width: 1200px;">

    <script>
        // ============================================
        // PAGE D'ADMINISTRATION
        // ============================================

        // Vérifier si l'utilisateur est connecté ET admin
        window.addEventListener('DOMContentLoaded', function() {
            const currentUser = sessionStorage.getItem('currentUser');
            
            if (!currentUser) {
                // Rediriger vers la page de connexion
                alert('Vous devez être connecté pour accéder à cette page');
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(currentUser);

            // Vérifier si l'utilisateur est admin
            if (user.role !== 'admin') {
                // Afficher un message d'erreur
                document.getElementById('adminContent').innerHTML = `
                    <div class="admin-content">
                        <div class="no-access">
                            <h3>Accès refusé</h3>
                            <p>Vous n'avez pas les permissions pour accéder à l'administration.</p>
                            <p style="margin-top: 15px;">Email: <strong>${user.email}</strong></p>
                        </div>
                    </div>
                `;
                return;
            }

            // Afficher le contenu admin
            displayAdminDashboard(user);
        });

        /**
         * Affiche le tableau de bord administrateur
         */
        function displayAdminDashboard(adminUser) {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const adminContent = document.getElementById('adminContent');

            let html = `
                <div class="admin-card" style="grid-column: 1 / -1;">
                    <h3>Bienvenue, Admin</h3>
                    <p>Connecté en tant que : <strong>${adminUser.email}</strong></p>
                    <p>Rôle : <span class="role-badge">Administrateur</span></p>
                </div>

                <!-- Statistiques -->
                <div class="admin-card">
                    <h3>Utilisateurs</h3>
                    <p style="font-size: 32px; font-weight: 700; color: #10b981; margin: 10px 0;">${users.length}</p>
                    <p>Nombre total d'utilisateurs enregistrés</p>
                </div>

                <div class="admin-card">
                    <h3>Admins</h3>
                    <p style="font-size: 32px; font-weight: 700; color: #3b82f6; margin: 10px 0;">${users.filter(u => u.role === 'admin').length}</p>
                    <p>Nombre total d'administrateurs</p>
                </div>

                <div class="admin-card">
                    <h3>Utilisateurs standards</h3>
                    <p style="font-size: 32px; font-weight: 700; color: #f59e0b; margin: 10px 0;">${users.filter(u => !u.role || u.role === 'user').length}</p>
                    <p>Utilisateurs non administrateurs</p>
                </div>

                <div class="admin-card">
                    <h3>Utilisation Statistiques</h3>
                    <p style="font-size: 32px; font-weight: 700; color: #3b82f6; margin: 10px 0;">📊</p>
                    <p>Tableau de bord complet</p>
                    <a href="stats.html" class="admin-button" style="display: block; text-align: center; text-decoration: none; margin-top: 10px;">
                        Voir les Stats →
                    </a>
                </div>

                <div class="admin-card">
                    <h3>Outils de Développement</h3>
                    <p style="font-size: 32px; font-weight: 700; color: #f59e0b; margin: 10px 0;">🔧</p>
                    <p>Tests et données</p>
                    <a href="tools.html" class="admin-button" style="display: block; text-align: center; text-decoration: none; margin-top: 10px;">
                        Accéder aux Outils →
                    </a>
                </div>

                <div style="grid-column: 1 / -1;" class="admin-section">
                    <h2>Gestion des utilisateurs</h2>
                    ${users.length > 0 ? buildUsersTable(users, adminUser.email) : '<p style="color: #999;">Aucun utilisateur enregistré</p>'}
                </div>

                        </button>

                        </button>
                        <button class="auth-button" onclick="logoutAdmin()">
                            🚪 Déconnexion
                        </button>
                    </div>
                </div>
            `;

            adminContent.innerHTML = html;
        }

        /**
         * Construit le tableau des utilisateurs
         */
        function buildUsersTable(users, adminEmail) {
            let html = '<table class="users-table"><thead><tr>';
            html += '<th>ID</th>';
            html += '<th>Email</th>';
            html += '<th>Nom</th>';
            html += '<th>Rôle</th>';
            html += '<th>Enregistré le</th>';
            html += '<th>Actions</th>';
            html += '</tr></thead><tbody>';

            users.forEach(user => {
                const createdDate = new Date(user.createdAt).toLocaleDateString('fr-FR');
                const roleClass = user.role === 'admin' ? 'role-badge' : '';
                const roleName = user.role === 'admin' ? 'Administrateur' : 'Utilisateur';
                const canDelete = user.email !== adminEmail; // Empêcher la suppression de son propre compte

                html += `<tr>
                    <td>${user.id}</td>
                    <td><strong>${user.email}</strong></td>
                    <td>${user.name}</td>
                    <td><span class="${roleClass}">${roleName}</span></td>
                    <td>${createdDate}</td>
                    <td>
                        ${canDelete ? `<button class="delete-btn" onclick="deleteUser('${user.email}')">Supprimer</button>` : '<span style="color: #999;">(Admin)</span>'}
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            return html;
        }

        /**
         * Supprime un utilisateur
         */
        function deleteUser(email) {
            if (confirm(`Êtes-vous sûr de vouloir supprimer l'utilisateur ${email} ?`)) {
                if (deleteUser(email)) { // Utilise la fonction du fichier auth.js
                    alert('Utilisateur supprimé');
                    // Rafraîchir la page
                    location.reload();
                } else {
                    alert('Erreur lors de la suppression');
                }
            }
        }

        /**
         * Oups ! Il y a un conflit de nom. Je dois renommer la fonction
         */
        function deleteUserAccount(email) {
            if (confirm(`Êtes-vous sûr de vouloir supprimer l'utilisateur ${email} ?`)) {
                // Récupérer les utilisateurs
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const filteredUsers = users.filter(u => u.email !== email);

                // Vérifier si l'utilisateur a été trouvé
                if (filteredUsers.length === users.length) {
                    alert('Utilisateur non trouvé');
                    return;
                }

                // Sauvegarder les changements
                localStorage.setItem('users', JSON.stringify(filteredUsers));
                alert('Utilisateur supprimé');
                
                // Rafraîchir la page
                location.reload();
            }
        }

        /**
         * Exporte les données des utilisateurs en JSON
         */
        function exportUsersData() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const dataStr = JSON.stringify(users, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `shadowwear-users-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        /**
         * Supprime tous les utilisateurs
         */
        function deleteAllUsers() {
            if (confirm('⚠️ ATTENTION ⚠️\n\nCette action supprimera DÉFINITIVEMENT tous les utilisateurs enregistrés.\n\nÊtes-vous absolument sûr ?')) {
                if (confirm('Tapez "OUI" pour confirmer la suppression complète')) {
                    localStorage.removeItem('users');
                    alert('Tous les utilisateurs ont été supprimés');
                    location.reload();
                }
            }
        }

        /**
         * Réinitialise le stockage
         */
        function clearStorage() {
            if (confirm('Cela va réinitialiser le stockage localStorage de votre navigateur.\n\nContinuer ?')) {
                localStorage.clear();
                sessionStorage.clear();
                alert('Stockage réinitialisé. Redirection vers la connexion...');
                window.location.href = 'login.html';
            }
        }

        /**
         * Déconnecte l'administrateur
         */
        function logoutAdmin() {
            sessionStorage.removeItem('currentUser');
            alert('Vous avez été déconnecté');
            window.location.href = 'login.html';
        }

        // Corriger le lien du bouton de suppression
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('delete-btn')) {
                const email = e.target.getAttribute('onclick').match(/'([^']+)'/)[1];
                deleteUserAccount(email);
            }
        });
    </script>
</body>
</html>
